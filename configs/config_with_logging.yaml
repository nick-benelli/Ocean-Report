# Test config with file-based logging
# Copy from config.yaml with logging changes

# NOAA Station Info
noaa:
  station_id: "8534720" # Atlantic City Station ID
  buoy_id: "44091" # Barnegat Buoy ID

# Email Settings
email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender: ${EMAIL_SENDER}
  password: ${EMAIL_PASSWORD}
  recipients: ${EMAIL_RECIPIENTS}
  test_recipients: ${TEST_RECIPIENTS}
  use_recipient_url: true
  recipient_urls:
    main: ${RECIPIENTS_GIST_URL}
    test: ${TEST_RECIPIENTS_GIST_URL}
    offseason: ${OFFSEASON_RECIPIENTS_GIST_URL}

# Location Coordinates
location:
  longitude: ${LONGITUDE}
  latitude: ${LATITUDE}
  beach_orientation_degrees: 140

# Reporting Settings
reporting:
  template_path: "templates/ocean-report-email.j2"
  subject: "🌊 LBI Daily Water Report"
  station_name: "NOAA Atlantic City (8534720)"
  station_city: "Atlantic City, NJ"
  wind_provider: "Open-Meteo"

# Determine Summertime
summer:
  memorial_day_offset: -4
  labor_day_offset: 7

# API Client Settings
api:
  verify_ssl: true
  timeout_seconds: 30.0
  retry_insecure_on_ssl_error: true
  max_retries: 3
  backoff_seconds: 0.8

# Logging Settings - CONFIGURED FOR FILE OUTPUT
logging:
  output: both  # Write to BOTH console and file
  file_path: logs/test_config_logging.log
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
